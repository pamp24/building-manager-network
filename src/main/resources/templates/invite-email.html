<!DOCTYPE html>
<html lang="el" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Πρόσκληση</title>
</head>

<body style="margin:0; padding:0; background-color:#f4f6f8; font-family:Arial, sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" style="padding:30px 0;">
    <tr>
        <td align="center">

            <table width="600" cellpadding="0" cellspacing="0"
                   style="background:#ffffff; border-radius:8px; padding:30px; box-shadow:0 2px 8px rgba(0,0,0,0.05);">

                <!-- HEADER -->
                <tr>
                    <td align="center">
                        <h2 style="margin-bottom:10px;">📨 Πρόσκληση στην πλατφόρμα</h2>
                    </td>
                </tr>

                <!-- BODY -->
                <tr>
                    <td style="padding-top:20px;">

                        <p style="font-size:16px;">
                            Γεια σου,
                        </p>

                        <p style="font-size:16px;">
                            Ο χρήστης <strong th:text="${username}">User</strong>
                            σε προσκάλεσε να συμμετάσχεις ως:
                        </p>

                        <!-- ROLE BADGE -->
                        <div style="text-align:center; margin:20px 0;">
                            <span style="background:#1976d2; color:white; padding:8px 16px; border-radius:20px; font-weight:bold;"
                                  th:text="${roleLabel}">
                                Role
                            </span>
                        </div>

                        <!-- OPTIONAL CONTEXT -->
                        <p style="font-size:15px;" th:if="${contextName != null}">
                            <strong th:text="${contextName}">Context</strong>
                        </p>

                        <p style="font-size:16px;">
                            Πάτησε το κουμπί για να αποδεχτείς την πρόσκληση:
                        </p>

                        <!-- BUTTON -->
                        <div style="text-align:center; margin:30px 0;">
                            <a th:href="${confirmationUrl}"
                               style="background:#1976d2; color:white; padding:14px 28px;
                                      border-radius:6px; text-decoration:none; font-weight:bold;">
                                Αποδοχή Πρόσκλησης
                            </a>
                        </div>

                        <p style="font-size:14px; color:#777;">
                            Αν δεν περιμένεις αυτή την πρόσκληση, μπορείς να αγνοήσεις αυτό το email.
                        </p>

                    </td>
                </tr>

                <!-- FOOTER -->
                <tr>
                    <td style="padding-top:30px; text-align:center; font-size:12px; color:#aaa;">
                        Building Manager Platform
                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
